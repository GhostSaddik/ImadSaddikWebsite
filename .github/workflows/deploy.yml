name: Manual deploy

on:
  workflow_dispatch:

jobs:
  build:
    name: Build frontend
    uses: ./.github/workflows/frontend-build.yml

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://setuprkhis.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download frontend artifact
        uses: actions/download-artifact@v6
        with:
          name: frontend-build
          path: ./frontend/dist
